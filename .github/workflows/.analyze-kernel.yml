name: Advanced Kernel Forensics

on:
  workflow_dispatch:

jobs:
  forensics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Analysis Tools
        run: sudo apt-get update && sudo apt-get install -y binwalk

      - name: Analyze Binary Structure
        run: |
          echo "--- Suche nach Kompressions-Headern ---"
          # -B führt eine Signaturanalyse durch
          binwalk Image > analysis.txt
          
          echo "--- Extraktions-Versuch ---"
          # -e extrahiert automatisch, was erkannt wurde
          binwalk -e Image || echo "Keine automatische Extraktion möglich."
          
          echo "--- Inhalt der Extraktion (falls vorhanden) ---"
          find _Image.extracted -type f 2>/dev/null || echo "Keine Dateien extrahiert."

      - name: Deep Search in Extracted Data
        run: |
          echo "--- Suche nach Frequenzwerten in extrahierten Daten ---"
          # Wir suchen in allen extrahierten Dateien nach den Hex-Werten
          # 1296 MHz (00 F9 43 4D) und 1416 MHz (00 3C 68 54)
          grep -rE "(\x00\xF9\x43\x4D|\x00\x3C\x68\x54)" _Image.extracted 2>/dev/null || echo "Werte nicht in extrahierten Daten gefunden."

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: forensics-report
          path: |
            analysis.txt
            _Image.extracted/
